[project]
name = "notary-sdk"
version = "0.1.0"
description = "Agent Notary SDK — AI 에이전트 행동을 자동으로 공증한다"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["notary_sdk"]
